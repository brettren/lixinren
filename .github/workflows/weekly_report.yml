name: Weekly Index Report

on:
  schedule:
    - cron: '0 15 * * 5'  # Friday 23:00 CST (UTC+8) = 15:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas openpyxl xlsxwriter akshare numpy

      - name: Update config with token
        env:
          LIXINGER_TOKEN: ${{ secrets.LIXINGER_TOKEN }}
        run: sed -i "s/^token = .*/token = \"$LIXINGER_TOKEN\"/" config.py

      - name: Generate drawdown CSV
        working-directory: allindex
        run: python all_index_drawdown_current_and_history.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Generate QDII funds drawdown
        working-directory: qdIIFunds
        run: python qdII_funds_drawdown.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Generate SW industry valuation
        working-directory: allindex
        run: python sw_industry_valuation.py

      - name: Collect weekly news
        working-directory: news
        run: python run_weekly.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Generate HTML report
        working-directory: allindex
        run: python generate_html_report.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add allindex/all_index_drawdown_current_and_history.csv
          git add allindex/all_index_drawdown_current_and_history.html
          git add allindex/sw_industry_valuation.csv
          git add qdIIFunds/qdII_funds_drawdown.csv
          git add news/weekly_news_report.csv
          TRADE_DATE=$(python -c "
          import akshare as ak, pandas as pd, datetime
          today = pd.Timestamp(datetime.date.today())
          df = ak.tool_trade_date_hist_sina()
          dates = pd.to_datetime(df['trade_date'])
          print(dates[dates <= today].max().strftime('%Y-%m-%d'))
          ")
          git diff --cached --quiet || git commit -m "Weekly report: $TRADE_DATE"
          git push
